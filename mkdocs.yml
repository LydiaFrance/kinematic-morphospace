site_name: kinematic-morphospace
site_description: Principal Component Analysis of bird flight morphing
repo_url: https://github.com/LydiaFrance/kinematic-morphospace
repo_name: LydiaFrance/kinematic-morphospace

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            members_order: source
            filters:
              - "!^_"
          paths:
            - src
  - section-index

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - API Reference:
      - api/index.md
      - Data Loading: api/data_loading.md
      - Data Scaling: api/data_scaling.md
      - Data Filtering: api/data_filtering.md
      - PCA Core: api/pca_core.md
      - PCA Scores: api/pca_scores.md
      - PCA Reconstruction: api/pca_reconstruct.md
      - Rotation: api/rotation.md
      - Validation: api/validation.md
      - Species Transform: api/species_transform.md
      - Cross Species: api/cross_species.md
      - Labelling: api/labelling.md
      - Clustering: api/clustering.md
      - Null Testing: api/null_testing.md
      - Plotting: api/plotting.md
